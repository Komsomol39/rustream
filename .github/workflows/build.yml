name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        id: build
        run: ./gradlew assembleDebug 2>&1 | tee build-log.txt; echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Save build result
        if: always()
        run: |
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "BUILD SUCCESSFUL" > build-errors.txt
          else
            echo "BUILD FAILED" > build-errors.txt
            tail -100 build-log.txt | grep -E "error:|Error:|FAILED|Exception" >> build-errors.txt || true
            echo "--- FULL LOG TAIL ---" >> build-errors.txt
            tail -50 build-log.txt >> build-errors.txt
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RuStream-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Commit build result
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add build-errors.txt || true
          git diff --staged --quiet || git commit -m "build result [skip ci]"
          git push || true
