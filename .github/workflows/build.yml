name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Restore keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.jks

      - name: Build Debug + Release APK
        env:
          KEYSTORE_PATH: /tmp/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew assembleDebug assembleRelease 2>&1 | tee build-log.txt || true

      - name: Create version.json
        if: success()
        run: |
          cat > version.json << EOF
          {
            "versionCode": ${{ github.run_number }},
            "versionName": "1.0.${{ github.run_number }}",
            "apkUrl": "https://github.com/Komsomol39/rustream/releases/latest/download/app-release.apk"
          }
          EOF

      - name: Save errors to repo
        if: always()
        run: |
          if [ -f app/build/outputs/apk/debug/app-debug.apk ] && [ -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "BUILD SUCCESSFUL" > build-errors.txt
          else
            echo "BUILD FAILED" > build-errors.txt
            grep -E "^e: |error:|unresolved reference|None of the following" build-log.txt | head -40 >> build-errors.txt || true
            echo "--- LAST 30 LINES ---" >> build-errors.txt
            tail -30 build-log.txt >> build-errors.txt
          fi
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add build-errors.txt
          git diff --staged --quiet || git commit -m "build result [skip ci]"
          git push || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RuStream-debug
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: Delete stale "latest" release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # softprops не перезаписывает ассеты с существующим именем —
          # поэтому сносим релиз и тег целиком, публикуем заново со свежими APK
          gh release delete latest --yes --cleanup-tag || true

      - name: Publish APK to "latest" release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: RuStream (latest build)
          body: |
            Автоматическая сборка из ветки main. Обновляется при каждом успешном билде.
            - `app-release.apk` — подписанный, для установки
            - `app-debug.apk` — отладочный
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
            version.json
          make_latest: true
