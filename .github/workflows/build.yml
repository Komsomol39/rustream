name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug > build-log.txt 2>&1 || true

      - name: Save build result
        if: always()
        run: |
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "BUILD SUCCESSFUL" > build-errors.txt
          else
            echo "BUILD FAILED" > build-errors.txt
            cat build-log.txt >> build-errors.txt
          fi
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add build-errors.txt
          git diff --staged --quiet || git commit -m "build result [skip ci]"
          git push

      - name: Fail if no APK
        run: test -f app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RuStream-debug
          path: app/build/outputs/apk/debug/app-debug.apk
