name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Restore keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.jks

      - name: Build Debug + Release APK
        env:
          KEYSTORE_PATH: /tmp/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          VERSION_CODE: ${{ github.run_number }}
        run: |
          set -o pipefail
          # Пишем лог, но НЕ маскируем провал: exit-код сохраняем в файл,
          # чтобы шаг «Save errors» успел выполниться (if: always), а затем упасть
          ./gradlew assembleDebug assembleRelease 2>&1 | tee build-log.txt || echo "$?" > .gradle-exit

      - name: Create version.json
        if: success()
        run: |
          cat > version.json << EOF
          {
            "versionCode": ${{ github.run_number }},
            "versionName": "1.0.${{ github.run_number }}",
            "apkUrl": "https://github.com/Komsomol39/rustream/releases/latest/download/app-release.apk"
          }
          EOF

      - name: Save errors to repo
        if: always()
        run: |
          if [ -f app/build/outputs/apk/debug/app-debug.apk ] && [ -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "BUILD SUCCESSFUL" > build-errors.txt
          else
            echo "BUILD FAILED" > build-errors.txt
            grep -E "^e: |error:|unresolved reference|None of the following" build-log.txt | head -40 >> build-errors.txt || true
            echo "--- LAST 30 LINES ---" >> build-errors.txt
            tail -30 build-log.txt >> build-errors.txt
          fi
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add build-errors.txt
          git diff --staged --quiet || git commit -m "build result [skip ci]"
          git push || true
          # Если сборка упала — валим workflow (лог уже сохранён и запушен)
          if [ -f .gradle-exit ]; then
            echo "gradle failed with exit $(cat .gradle-exit)"; exit 1
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RuStream-debug
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: Publish to "latest" release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          REL=app/build/outputs/apk/release/app-release.apk
          DBG=app/build/outputs/apk/debug/app-debug.apk

          test -f "$REL" || { echo "release APK missing"; exit 1; }
          test -f "$DBG" || { echo "debug APK missing"; exit 1; }

          # Релиз держим постоянным (тег latest), ассеты перезаписываем --clobber.
          # Не пересоздаём релиз: это провоцировало гонку и пустые релизы.
          gh release view latest >/dev/null 2>&1 || \
            gh release create latest --title "RuStream (latest build)" \
              --notes "Автоматическая сборка из ветки main. Обновляется при каждом успешном билде."

          # Загрузка больших APK иногда срывается — ретраим каждый файл
          upload() {
            for i in 1 2 3; do
              if gh release upload latest "$1" --clobber; then return 0; fi
              echo "retry upload $1 (attempt $i)"; sleep 10
            done
            echo "failed to upload $1"; return 1
          }
          upload "$REL"
          upload "$DBG"
          upload version.json

          # Проверяем, что оба APK действительно в релизе (без jq — простой текст)
          sleep 5
          gh release view latest > /tmp/rel.txt 2>&1 || true
          grep -q app-release.apk /tmp/rel.txt || { echo "release APK not in release"; cat /tmp/rel.txt; exit 1; }
          grep -q app-debug.apk   /tmp/rel.txt || { echo "debug APK not in release"; cat /tmp/rel.txt; exit 1; }
          echo "both APKs present in latest release"
          make_latest: true
