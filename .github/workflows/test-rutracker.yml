name: Test RuTracker

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run test
        env:
          RUTRACKER_LOGIN: ${{ secrets.RUTRACKER_LOGIN }}
          RUTRACKER_PASSWORD: ${{ secrets.RUTRACKER_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/test_rutracker.py || true
