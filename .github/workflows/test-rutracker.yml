name: Test RuTracker

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run test
        env:
          RUTRACKER_LOGIN: ${{ secrets.RUTRACKER_LOGIN }}
          RUTRACKER_PASSWORD: ${{ secrets.RUTRACKER_PASSWORD }}
        run: python3 scripts/test_rutracker.py || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.txt
          retention-days: 1
