name: YTS Probe
on: workflow_dispatch
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe YTS mirrors and torrent format
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124 Safari/537.36"
          echo "===== API mirrors ====="
          for m in yts.mx yts.bz yts.rs yts.am yts.lt movies-api.accel.li; do
            echo "--- $m ---"
            curl -s --max-time 15 -H "User-Agent: $UA" \
              "https://$m/api/v2/list_movies.json?query_term=inception&limit=1" \
              -o /tmp/r.json -w "HTTP %{http_code}\n" || echo "curl fail"
            python3 - <<PY
import json
try:
    d=json.load(open('/tmp/r.json'))
    m=d['data']['movies'][0]; t=m['torrents'][0]
    print("  status:", d.get('status'))
    print("  title:", m['title'], "| hash:", t['hash'])
    print("  api url field:", t.get('url'))
    print("  size:", t.get('size'))
except Exception as e:
    print("  parse:", e)
PY
          done
          echo
          echo "===== .torrent formats (using a known hash) ====="
          # берём hash с первого живого зеркала
          H=$(curl -s --max-time 15 -H "User-Agent: $UA" "https://yts.bz/api/v2/list_movies.json?query_term=inception&limit=1" | python3 -c "import json,sys;print(json.load(sys.stdin)['data']['movies'][0]['torrents'][0]['hash'])" 2>/dev/null)
          echo "hash: $H"
          for host in yts.bz yts.mx yts.rs; do
            for path in "torrent/download/$H" "torrent/download/$H.torrent"; do
              echo -n "https://$host/$path -> "
              curl -s -o /dev/null --max-time 15 -H "User-Agent: $UA" -w "HTTP %{http_code} type=%{content_type}\n" "https://$host/$path" || echo fail
            done
          done
