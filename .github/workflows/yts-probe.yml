name: YTS Probe
on:
  push:
    paths: [ .github/workflows/yts-probe.yml ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Probe
        continue-on-error: true
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124 Safari/537.36"
          OUT=yts-probe-result.txt
          echo "probe $(date -u)" > $OUT
          echo "===== API mirrors =====" >> $OUT
          for m in yts.mx yts.bz yts.rs yts.am yts.lt movies-api.accel.li; do
            code=$(curl -s --max-time 15 -H "User-Agent: $UA" "https://$m/api/v2/list_movies.json?query_term=inception&limit=1" -o /tmp/r.json -w "%{http_code}" || echo 000)
            info=$(python3 -c "
import json
try:
    d=json.load(open('/tmp/r.json'))
    t=d['data']['movies'][0]['torrents'][0]
    print('status='+str(d.get('status'))+' hash='+t['hash']+' apiurl='+str(t.get('url'))+' size='+str(t.get('size')))
except Exception as e:
    print('parse_fail:'+str(e)[:60])
" 2>/dev/null)
            echo "$m HTTP=$code $info" >> $OUT
          done
          echo "" >> $OUT
          echo "===== .torrent formats =====" >> $OUT
          H=$(curl -s --max-time 15 -H "User-Agent: $UA" "https://yts.bz/api/v2/list_movies.json?query_term=inception&limit=1" | python3 -c "import json,sys;print(json.load(sys.stdin)['data']['movies'][0]['torrents'][0]['hash'])" 2>/dev/null)
          echo "test hash: $H" >> $OUT
          for host in yts.bz yts.mx yts.rs yts.lt; do
            for suf in "" ".torrent"; do
              c=$(curl -sL -o /dev/null --max-time 15 -H "User-Agent: $UA" -w "%{http_code} %{content_type}" "https://$host/torrent/download/$H$suf" || echo fail)
              echo "https://$host/torrent/download/HASH$suf -> $c" >> $OUT
            done
          done
          cat $OUT
      - name: Commit result
        if: always()
        run: |
          git config user.email "ci@local"; git config user.name "ci"
          git add yts-probe-result.txt
          git commit -m "yts probe result [skip ci]" || true
          git push || true
